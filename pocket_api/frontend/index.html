<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>FormaDigital Pocket</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Space Grotesk', sans-serif; }
    #map { height: 450px; border: 2px solid #000; }
    .leaflet-popup-content { margin: 0.5rem; font-size: 0.8rem; }
    .leaflet-popup-content strong { font-size: 0.9rem; }
    @keyframes indeterminate {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
    .bar-anim { animation: indeterminate 1.5s infinite ease-in-out; width: 33.333%; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .pulse-dot { animation: pulse-dot 1s infinite; }
    @keyframes toast-in {
      0% { transform: translateX(100%); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    .toast { animation: toast-in 0.3s ease-out; }
  </style>
</head>
<body class="bg-white text-black">
  <div class="max-w-6xl mx-auto p-6">

    <div class="mb-6">
      <h1 class="text-3xl font-bold uppercase tracking-tight">FormaDigital Pocket</h1>
      <p class="text-sm mt-1 border-t-2 border-black pt-1">Prospección para vendedor &mdash; Google Maps + web + redes</p>
    </div>

    <form id="form" class="border-2 border-black p-4 space-y-3">
      <div class="flex gap-2">
        <input id="q" placeholder="Rubro, ej: cafeterías" class="flex-1 border-2 border-black p-2 text-sm" required />
        <input id="near" placeholder="Zona, ej: Haedo" class="flex-1 border-2 border-black p-2 text-sm" />
        <input id="radius" type="number" min="0.5" max="50" step="0.5" placeholder="Radio km" class="w-24 border-2 border-black p-2 text-sm" />
      </div>
      <div class="flex gap-2">
        <input id="token" type="password" placeholder="Token de acceso" class="flex-1 border-2 border-black p-2 text-sm" />
        <label class="flex items-center gap-2 text-sm cursor-pointer select-none">
          <input id="noCache" type="checkbox" class="w-4 h-4" />
          Forzar nueva búsqueda
        </label>
        <button type="submit" class="bg-black text-white px-6 py-2 border-2 border-black uppercase text-sm tracking-wider font-semibold hover:bg-[#D02020] hover:border-[#D02020] transition-colors">Buscar</button>
      </div>
      <details class="text-sm cursor-pointer">
        <summary class="text-xs uppercase tracking-wider text-gray-500">⚙ Configuración avanzada</summary>
        <div class="mt-2 space-y-2 border-t-2 border-black pt-2">
          <input id="orKey" type="password" placeholder="OpenRouter API Key (opcional — para análisis con IA)" class="w-full border-2 border-black p-2 text-sm" />
        </div>
      </details>
    </form>

    <div id="progress-area" class="hidden mt-4 border-2 border-black p-3">
      <div class="w-full h-2 bg-gray-200 overflow-hidden">
        <div class="h-full bg-[#D02020] bar-anim"></div>
      </div>
      <div class="flex justify-between mt-2 text-sm font-mono">
        <span id="progress-text">Iniciando...</span>
        <span id="progress-time">0s</span>
      </div>
    </div>

    <div id="status" class="text-sm mt-3 border-l-4 border-black pl-2">Listo. Ingresá un rubro y buscá.</div>

    <div id="stats-bar" class="hidden mt-4 grid grid-cols-4 gap-2"></div>

    <div id="audit-bar" class="hidden mt-4 border-2 border-black p-3 flex items-center justify-between bg-white">
      <span id="audit-count" class="text-sm font-bold">0 seleccionados</span>
      <div class="flex items-center gap-3">
        <span id="audit-progress" class="text-sm hidden"></span>
        <button id="audit-btn" class="bg-[#D02020] text-white px-4 py-2 border-2 border-black text-sm font-semibold uppercase tracking-wider hover:bg-black transition-colors">Auditar seleccionados</button>
      </div>
    </div>

    <div id="toast-area" class="fixed top-4 right-4 z-50 space-y-2 w-80"></div>

    <div class="flex gap-4 mt-4">
      <div id="results" class="w-1/2"></div>
      <div id="map" class="w-1/2 sticky top-4"></div>
    </div>

  </div>

  <script>
    console.log('[Pocket] Iniciando app...');
    let map = null;
    let markers = [];
    let selected = new Set();
    let leadsData = [];
    let currentSearchId = null;
    let currentToken = 'changeme';
    let currentOrKey = '';

    function initMap() {
      if (map) return;
      console.log('[Pocket] Inicializando mapa...');
      map = L.map('map').setView([-34.61, -58.38], 12);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>'
      }).addTo(map);
    }

    function toast(msg, type) {
      const area = document.getElementById('toast-area');
      const colors = { ok: 'bg-white border-black text-black', err: 'bg-[#D02020] border-black text-white', info: 'bg-white border-black text-black' };
      const icons = { ok: '✅', err: '✕', info: 'ℹ' };
      const el = document.createElement('div');
      el.className = 'toast border-2 border-black p-3 text-sm flex items-center gap-2 shadow-[4px_4px_0px_0px_#000] ' + (colors[type] || colors.info);
      el.innerHTML = '<span>' + (icons[type] || '') + '</span><span>' + msg + '</span>';
      area.appendChild(el);
      setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, 4000);
      console.log('[Pocket] Toast ' + type + ':', msg);
    }

    function updateMap(leads) {
      initMap();
      markers.forEach(m => map.removeLayer(m));
      markers = [];

      const bounds = [];
      const hasCoords = leads.filter(l => l.latitude && l.longitude);
      console.log('[Pocket] Leads con coordenadas:', hasCoords.length);
      hasCoords.forEach(lead => {
        const lat = parseFloat(lead.latitude);
        const lng = parseFloat(lead.longitude);
        if (isNaN(lat) || isNaN(lng)) return;
        const popup = '<strong>' + escapeHtml(lead.name || '?') + '</strong><br>' +
          (lead.rating ? '⭐ ' + lead.rating + ' (' + (lead.reviews_count || '?') + ')' : '') +
          (lead.category ? '<br>' + escapeHtml(lead.category) : '');
        const m = L.marker([lat, lng]).addTo(map).bindPopup(popup);
        markers.push(m);
        bounds.push([lat, lng]);
      });

      if (bounds.length > 0) {
        map.fitBounds(bounds, { padding: [30, 30] });
      } else {
        map.setView([-34.61, -58.38], 12);
      }
    }

    function showProgress(show) {
      document.getElementById('progress-area').classList.toggle('hidden', !show);
    }

    function setProgressText(t) {
      document.getElementById('progress-text').textContent = t;
    }

    function updateAuditBar() {
      const bar = document.getElementById('audit-bar');
      const count = selected.size;
      document.getElementById('audit-count').textContent = count + ' seleccionados';
      bar.classList.toggle('hidden', count === 0);
    }

    function toggleSelect(idx) {
      if (selected.has(idx)) selected.delete(idx); else selected.add(idx);
      updateAuditBar();
      const cb = document.getElementById('cb-' + currentSearchId + '-' + idx);
      if (cb) cb.checked = selected.has(idx);
      const card = document.getElementById('card-' + currentSearchId + '-' + idx);
      if (card) card.style.outline = selected.has(idx) ? '3px solid #D02020' : '';
    }

    function renderStats(leads) {
      const total = leads.length;
      const withWeb = leads.filter(l => {
        const w = l.website_norm || l.website || '';
        return w && !w.includes('search.google.com');
      }).length;
      const avgRating = leads.reduce((s, l) => s + (parseFloat(l.rating) || 0), 0) / (total || 1);
      const scores = leads.map(l => Math.max(l.web_score || 0, l.gmb_score || 0, l.whatsapp_score || 0, l.erp_score || 0));
      const avgScore = scores.reduce((a, b) => a + b, 0) / (scores.length || 1);

      const bar = document.getElementById('stats-bar');
      bar.innerHTML = '';
      bar.classList.remove('hidden');

      const items = [
        { label: 'Total', val: total },
        { label: 'Con web', val: withWeb },
        { label: 'Rating', val: avgRating.toFixed(1) },
        { label: 'Score', val: Math.round(avgScore) },
      ];
      items.forEach(item => {
        const d = document.createElement('div');
        d.className = 'border-2 border-black p-2 text-center';
        d.innerHTML = '<div class="text-2xl font-bold">' + item.val + '</div><div class="text-xs uppercase tracking-wider">' + item.label + '</div>';
        bar.appendChild(d);
      });
    }

    function renderAuditResult(ana, container) {
      let h = '';
      const sourceBadge = ana.analysis_source === 'llm' ? '<span class="border-2 border-black px-1.5 py-0.5 text-[10px] font-bold uppercase tracking-wider ml-2">IA</span>' : '<span class="border-2 border-black px-1.5 py-0.5 text-[10px] font-bold uppercase tracking-wider ml-2">Reglas</span>';
      if (ana.strengths && ana.strengths.length) h += '<div class="border-l-4 border-black pl-2 mt-2"><div class="text-xs font-bold uppercase tracking-wider">Fortalezas' + sourceBadge + '</div><div class="text-sm">' + escapeHtml(ana.strengths.join('; ')) + '</div></div>';
      if (ana.weaknesses && ana.weaknesses.length) h += '<div class="border-l-4 border-black pl-2 mt-2"><div class="text-xs font-bold uppercase tracking-wider">Debilidades</div><div class="text-sm">' + escapeHtml(ana.weaknesses.join('; ')) + '</div></div>';
      if (ana.opportunities && ana.opportunities.length) h += '<div class="border-l-4 border-black pl-2 mt-2"><div class="text-xs font-bold uppercase tracking-wider">Oportunidades</div><div class="text-sm">' + escapeHtml(ana.opportunities.join('; ')) + '</div></div>';
      if (ana.sales_angle) h += '<div class="border-l-4 border-[#D02020] pl-2 mt-2"><div class="text-xs font-bold uppercase tracking-wider">Ángulo de venta</div><div class="text-sm">' + escapeHtml(ana.sales_angle) + '</div></div>';
      if (ana.llm_analysis) h += '<div class="border-l-4 border-[#D02020] pl-2 mt-2"><div class="text-xs font-bold uppercase tracking-wider">Análisis IA <span class="border-2 border-black px-1.5 py-0.5 text-[10px] font-bold">LLM</span></div><div class="text-sm mt-1" style="white-space:pre-wrap">' + escapeHtml(ana.llm_analysis) + '</div></div>';
      container.innerHTML = h || '<div class="text-sm border-l-4 border-black pl-2 mt-2">Sin resultados de auditoría</div>';
    }

    function runAudit() {
      if (selected.size === 0) { toast('Seleccioná al menos un lead', 'err'); return; }

      const btn = document.getElementById('audit-btn');
      const prog = document.getElementById('audit-progress');
      btn.disabled = true;
      btn.textContent = 'Auditando...';
      prog.classList.remove('hidden');

      const indices = Array.from(selected);
      let done = 0;
      const total = indices.length;
      console.log('[Pocket] Iniciando auditoría de', total, 'leads...');
      toast('Auditando ' + total + ' leads...', 'info');

      indices.forEach(idx => {
        const container = document.getElementById('audit-' + currentSearchId + '-' + idx);
        if (!container) { done++; return; }
        container.innerHTML = '<span class="text-xs pulse-dot">▶ Auditando...</span>';

        const headers = { 'Authorization': 'Bearer ' + currentToken };
        if (currentOrKey) headers['X-OpenRouter-Key'] = currentOrKey;
        fetch('/analyze/' + currentSearchId + '/' + idx, {
          method: 'POST',
          headers: headers
        })
        .then(r => {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(ana => {
          console.log('[Pocket] Auditoría OK lead #' + idx + ':', ana.name || '?');
          renderAuditResult(ana, container);
        })
        .catch(err => {
          console.error('[Pocket] Error auditoría lead #' + idx + ':', err);
          container.innerHTML = '<span class="text-xs text-[#D02020]">✕ Error en auditoría: ' + escapeHtml(err.message) + '</span>';
        })
        .finally(() => {
          done++;
          prog.textContent = done + '/' + total;
          if (done >= total) {
            btn.disabled = false;
            btn.textContent = 'Auditar seleccionados';
            prog.classList.add('hidden');
            console.log('[Pocket] Auditoría completada:', total, 'leads');
            toast('Auditoría completada: ' + total + ' leads', 'ok');
          }
        });
      });
    }

    function renderLeadCard(lead, idx) {
      const contact = [lead.phone, lead.telephone, lead.contact_phone].find(Boolean) || '';
      const address = lead.address || lead.location || '';
      const website = lead.website_norm || lead.website || '';
      const reviews = lead.reviews_count != null ? lead.reviews_count : '?';
      const cms = lead.cms || '';
      const ig = lead.instagram || '';
      const fb = lead.facebook || '';
      const hasWeb = website && !website.includes('search.google.com');

      const bestScore = Math.max(lead.web_score || 0, lead.gmb_score || 0, lead.whatsapp_score || 0, lead.erp_score || 0);

      const opportunity = [
        { key: 'Web', score: lead.web_score },
        { key: 'GMB', score: lead.gmb_score },
        { key: 'WhatsApp', score: lead.whatsapp_score },
        { key: 'ERP', score: lead.erp_score },
      ].sort((a, b) => (b.score ?? 0) - (a.score ?? 0)).slice(0, 2);
      const angles = opportunity.map(o => o.key + ' (' + (o.score ?? 0) + ')').join(' + ');

      const sid = currentSearchId;
      return '<div id="card-' + sid + '-' + idx + '" class="border-2 border-black p-4 mb-3">' +
        '<div class="flex items-start gap-3">' +
          '<input type="checkbox" id="cb-' + sid + '-' + idx + '" class="mt-1 w-5 h-5 cursor-pointer" onchange="toggleSelect(' + idx + ')">' +
          '<div class="w-full">' +
            '<div class="flex items-center gap-2">' +
              '<div class="font-bold text-lg">' + escapeHtml(lead.name || 'Sin nombre') + '</div>' +
              '<span class="border-2 border-black px-2 py-0.5 text-xs font-bold">' + bestScore + '</span>' +
            '</div>' +
            '<div class="text-sm mt-1">' + (lead.category ? escapeHtml(lead.category) + (address ? ' &bull; ' : '') : '') + escapeHtml(address) + '</div>' +
            '<div class="text-sm mt-1 space-x-2">' +
              (contact ? '<span>📞 ' + escapeHtml(contact) + '</span>' : '') +
              (hasWeb ? '<span>🌐 <a href="' + website + '" target="_blank" rel="noreferrer" class="underline">web</a>' + (cms ? ' (' + escapeHtml(cms) + ')' : '') + '</span>' : '<span class="text-[#D02020]">✕ sin web</span>') +
              (lead.rating != null ? '<span>⭐ ' + lead.rating + ' (' + reviews + ')</span>' : '') +
              (ig ? '<span>📷 @' + escapeHtml(ig) + '</span>' : '') +
              (fb ? '<span>👍 ' + escapeHtml(fb) + '</span>' : '') +
            '</div>' +
            '<div class="text-sm mt-1">Oportunidad: <strong>' + escapeHtml(angles || 'sin señal clara') + '</strong></div>' +
            '<div id="audit-' + sid + '-' + idx + '" class="mt-2"></div>' +
          '</div>' +
        '</div>' +
      '</div>';
    }

    const form = document.getElementById('form');
    const status = document.getElementById('status');
    const results = document.getElementById('results');
    const tokenInput = document.getElementById('token');
    const orKeyInput = document.getElementById('orKey');
    const noCacheInput = document.getElementById('noCache');
    const savedToken = localStorage.getItem('pocket_token') || 'changeme';
    if (savedToken) { tokenInput.value = savedToken; console.log('[Pocket] Token restaurado de localStorage'); }
    const savedOrKey = localStorage.getItem('pocket_or_key') || '';
    if (savedOrKey) { orKeyInput.value = savedOrKey; currentOrKey = savedOrKey; console.log('[Pocket] OpenRouter key restaurada'); }
    document.getElementById('audit-btn').addEventListener('click', runAudit);
    initMap();
    console.log('[Pocket] App lista');

    form.onsubmit = async (e) => {
      e.preventDefault();
      console.log('[Pocket] Iniciando búsqueda...');
      selected.clear();
      updateAuditBar();
      results.innerHTML = '';
      document.getElementById('stats-bar').innerHTML = '';
      document.getElementById('stats-bar').classList.add('hidden');

      currentToken = document.getElementById('token').value || 'changeme';
      localStorage.setItem('pocket_token', currentToken);
      currentOrKey = document.getElementById('orKey').value.trim();
      if (currentOrKey) localStorage.setItem('pocket_or_key', currentOrKey);
      else localStorage.removeItem('pocket_or_key');
      const q = document.getElementById('q').value.trim();
      const near = document.getElementById('near').value.trim();
      const radius = document.getElementById('radius').value;
      const noCache = document.getElementById('noCache').checked;
      const ctx = q + (near ? ' en ' + near : '');

      if (!q) { toast('Completá el rubro a buscar', 'err'); return; }

      showProgress(true);
      status.textContent = '';

      let elapsed = 0;
      const timer = setInterval(() => {
        elapsed++;
        document.getElementById('progress-time').textContent = elapsed + 's';
      }, 1000);

      setProgressText('🔍 Buscando ' + ctx + '...');

      const body = { query: q };
      if (near) body.near = near;
      if (radius) body.radius_km = parseFloat(radius);
      if (noCache) body.no_cache = true;
      console.log('[Pocket] POST /search body:', JSON.stringify(body));

      try {
        const res = await fetch('/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + currentToken },
          body: JSON.stringify(body)
        });
        const init = await res.json();
        console.log('[Pocket] POST /search respuesta:', init);

        if (!res.ok) {
          clearInterval(timer);
          showProgress(false);
          const msg = 'Error: ' + (init.detail || JSON.stringify(init));
          status.innerHTML = '<span class="text-[#D02020] font-bold">✕</span> ' + escapeHtml(msg);
          toast(msg, 'err');
          return;
        }

        setProgressText('⚡ Cargando ' + (init.leads_count ?? 0) + ' resultados...');

        const data = await fetch('/leads/' + init.search_id, {
          headers: { 'Authorization': 'Bearer ' + currentToken }
        }).then(r => {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        });
        console.log('[Pocket] GET /leads leads:', data.leads ? data.leads.length : 0);

        clearInterval(timer);
        showProgress(false);

        const leadCount = data.leads ? data.leads.length : 0;
        const cachedTag = init.cached ? ' <span class="border-2 border-black px-1.5 py-0.5 text-[10px] font-bold uppercase">Cache</span>' : '';
        status.innerHTML = '<span class="font-bold">✅</span> ' + leadCount + ' leads encontrados en ' + elapsed + 's' + cachedTag;

        if (leadCount === 0) {
          toast('No se encontraron leads para "' + ctx + '"', 'info');
        } else {
          toast(leadCount + ' leads encontrados', 'ok');
        }

        currentSearchId = init.search_id;
        leadsData = data.leads || [];
        updateMap(leadsData);
        renderStats(leadsData);

        const exportLink = '/export/' + currentSearchId;
        const header = '<div class="flex justify-between items-center mb-3 border-b-2 border-black pb-2"><h2 class="text-xl font-bold uppercase">Resultados</h2><a href="' + exportLink + '" target="_blank" class="text-sm font-semibold underline">Exportar</a></div>';

        const cards = leadsData.map((lead, idx) => renderLeadCard(lead, idx));
        results.innerHTML = header + (cards.join('') || '<p class="text-sm border-2 border-black p-4">Sin resultados.</p>');
      } catch (err) {
        clearInterval(timer);
        showProgress(false);
        console.error('[Pocket] Error en búsqueda:', err);
        status.innerHTML = '<span class="text-[#D02020] font-bold">✕ Error de conexión:</span> ' + escapeHtml(err.message);
        toast('Error de conexión: ' + err.message, 'err');
      }
    };

    function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]); }
  </script>
</body>
</html>
